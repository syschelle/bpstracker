name: bpstracker

services:
  postgres:
    image: postgres:16-alpine
    container_name: bpstracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bpstracker}
      POSTGRES_USER: ${POSTGRES_USER:-bpstracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bpstracker_dev_password}
    volumes:
      - /opt/bpstracker/data/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bpstracker} -d ${POSTGRES_DB:-bpstracker}"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    image: ghcr.io/syschelle/bpstracker-backend:${BPSTRACKER_IMAGE_TAG:-latest}
    container_name: bpstracker-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-BPSTracker}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://bpstracker:bpstracker_dev_password@postgres:5432/bpstracker}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - /opt/bpstracker/data/backend:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    image: ghcr.io/syschelle/bpstracker-frontend:${BPSTRACKER_IMAGE_TAG:-latest}
    container_name: bpstracker-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-same-origin}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
