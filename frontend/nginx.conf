server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS. valid=10s sorgt dafür, dass nginx den Backend-Container
    # nach einem Recreate/Update wieder neu auflöst.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bpstracker_backend http://backend:8000;


    # Kindle-PNG muss immer über dieselbe feste URL abrufbar sein.
    # Keine Query-Parameter verwenden; stattdessen Caching deaktivieren.
    location = /api/kindle/display.png {
        proxy_pass $bpstracker_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Browser ruft /api/... am Frontend-Port auf. nginx leitet intern an den
    # Backend-Service im Docker-Netz weiter. Der Backend-Port ist nicht am Host veröffentlicht.
    location /api/ {
        proxy_pass $bpstracker_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
