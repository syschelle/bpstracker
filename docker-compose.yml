name: bpstracker

services:
  postgres:
    image: postgres:16-alpine
    container_name: bpstracker-postgres
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bpstracker}
      POSTGRES_USER: ${POSTGRES_USER:-bpstracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - /opt/bpstracker/data/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bpstracker} -d ${POSTGRES_DB:-bpstracker}"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
    image: bpstracker/backend:local
    container_name: bpstracker-backend
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-BPSTracker}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - /opt/bpstracker/data/backend:/app/data
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.static
    image: bpstracker/frontend:local
    container_name: bpstracker-frontend
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-same-origin}
      BPSTRACKER_DEFAULT_LANGUAGE: ${BPSTRACKER_DEFAULT_LANGUAGE:-de}
      BPSTRACKER_LANGUAGE: ${BPSTRACKER_LANGUAGE:-de}
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    expose:
      - "8080"
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
      - /var/cache/nginx:size=32m,noexec,nosuid,nodev
      - /var/run:size=8m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD-SHELL", "test -s /usr/share/nginx/html/index.html && test -s /tmp/bpstracker-config/config.js && [ \"$(cat /proc/1/comm 2>/dev/null)\" = nginx ]"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
